<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
    canvas.width = window.innerWidth * DPR;
    canvas.height = window.innerHeight * DPR;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.scale(DPR, DPR);
}
window.addEventListener('resize', () => { resize(); });
resize();

const W = () => window.innerWidth;
const H = () => window.innerHeight;
const rnd = (a, b) => Math.random() * (b - a) + a;
const flowers = [];
const particles = [];

class Dust {
    constructor() { this.reset(); }
    reset() {
        this.x = rnd(0, W());
        this.y = rnd(0, H());
        this.r = rnd(0.5, 2.5);
        this.a = rnd(0, Math.PI * 2);
        this.speed = rnd(0.1, 0.4);
        this.opacity = rnd(0.1, 0.5);
        this.hue = rnd(20, 60);
    }
    update() {
        this.y -= this.speed;
        this.x += Math.sin(this.a) * 0.3;
        this.a += 0.01;
        if (this.y < -5) this.reset();
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 80%, 80%, ${this.opacity})`;
        ctx.fill();
    }
}
for (let i = 0; i < 80; i++) particles.push(new Dust());

function radialGrad(x, y, r0, r1, stops) {
    const g = ctx.createRadialGradient(x, y, r0, x, y, r1);
    stops.forEach(([t, c]) => g.addColorStop(t, c));
    return g;
}
function linearGrad(x0, y0, x1, y1, stops) {
    const g = ctx.createLinearGradient(x0, y0, x1, y1);
    stops.forEach(([t, c]) => g.addColorStop(t, c));
    return g;
}

function drawRealisticRose(ctx, size, bloom) {
    const s = size * bloom;
    const layers = [
        { n: 5, off: s * 0.95, ew: s * 0.55, eh: s * 1.1, inner: '#6b0020', outer: '#c8003a' },
        { n: 6, off: s * 0.70, ew: s * 0.50, eh: s * 1.0,  inner: '#8b0030', outer: '#e0004a' },
        { n: 7, off: s * 0.50, ew: s * 0.45, eh: s * 0.85, inner: '#aa0038', outer: '#ff2060' },
        { n: 5, off: s * 0.30, ew: s * 0.35, eh: s * 0.65, inner: '#cc1040', outer: '#ff5070' },
        { n: 4, off: s * 0.15, ew: s * 0.22, eh: s * 0.45, inner: '#dd2050', outer: '#ff7090' },
    ];
    layers.forEach((l, li) => {
        for (let i = 0; i < l.n; i++) {
            ctx.save();
            ctx.rotate((Math.PI * 2 / l.n) * i + li * 0.35);
            ctx.beginPath();
            ctx.ellipse(0, -l.off, l.ew, l.eh, 0, 0, Math.PI * 2);
            const g = radialGrad(0, -l.off * 0.5, 0, l.eh, [
                [0, l.outer], [0.5, l.inner], [1, '#3d0010']
            ]);
            ctx.fillStyle = g;
            ctx.shadowColor = 'rgba(255,100,120,0.18)';
            ctx.shadowBlur = 8;
            ctx.fill();
            ctx.restore();
        }
    });
    const cg = radialGrad(0, 0, 0, s * 0.18, [
        [0, '#ff90a0'], [0.5, '#cc2040'], [1, '#6b0020']
    ]);
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.18, 0, Math.PI * 2);
    ctx.fillStyle = cg;
    ctx.fill();
}

function drawRealisticSunflower(ctx, size, bloom) {
    const s = size * bloom;
    for (let row = 0; row < 2; row++) {
        const n = 20 + row * 4;
        const off = s * (0.85 - row * 0.18);
        const ew = s * (0.14 - row * 0.02);
        const eh = s * (0.52 - row * 0.08);
        for (let i = 0; i < n; i++) {
            ctx.save();
            ctx.rotate((Math.PI * 2 / n) * i + row * (Math.PI / n));
            ctx.beginPath();
            ctx.ellipse(0, -off, ew, eh, 0, 0, Math.PI * 2);
            const g = linearGrad(0, -off - eh, 0, -off + eh, [
                [0, '#ffe066'], [0.4, '#ffb703'], [1, '#cc7a00']
            ]);
            ctx.fillStyle = g;
            ctx.fill();
            ctx.restore();
        }
    }
    const diskR = s * 0.42;
    const diskG = radialGrad(0, 0, 0, diskR, [
        [0, '#3d1a00'], [0.35, '#5c2a00'], [0.65, '#7a3b00'], [0.85, '#4a2200'], [1, '#2a1000']
    ]);
    ctx.beginPath();
    ctx.arc(0, 0, diskR, 0, Math.PI * 2);
    ctx.fillStyle = diskG;
    ctx.fill();
    const rings = 5;
    for (let r = 1; r <= rings; r++) {
        const dotR = (diskR / rings) * r;
        const dotN = Math.round(6 * r);
        for (let i = 0; i < dotN; i++) {
            const angle = (Math.PI * 2 / dotN) * i + r * 0.5;
            const dx = Math.cos(angle) * dotR;
            const dy = Math.sin(angle) * dotR;
            ctx.beginPath();
            ctx.arc(dx, dy, 1.8, 0, Math.PI * 2);
            ctx.fillStyle = r % 2 === 0 ? '#2a1000' : '#6b3800';
            ctx.fill();
        }
    }
}

function drawRealisticLily(ctx, size, bloom) {
    const s = size * bloom;
    const petalColors = [
        ['#fff0f5', '#ffaabb', '#cc5566'],
        ['#fff5e0', '#ffcc88', '#cc8833'],
    ];
    const pc = petalColors[Math.floor(Math.random() * petalColors.length)];
    for (let i = 0; i < 6; i++) {
        ctx.save();
        ctx.rotate((Math.PI / 3) * i);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(s * 0.38, -s * 0.3, s * 0.42, -s * 1.1, 0, -s * 1.45);
        ctx.bezierCurveTo(-s * 0.42, -s * 1.1, -s * 0.38, -s * 0.3, 0, 0);
        const g = linearGrad(0, 0, 0, -s * 1.45, [
            [0, pc[2]], [0.3, pc[1]], [0.7, pc[0]], [1, '#ffffff']
        ]);
        ctx.fillStyle = g;
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(0, -s * 0.1);
        ctx.quadraticCurveTo(s * 0.04, -s * 0.75, 0, -s * 1.35);
        ctx.strokeStyle = `rgba(200,100,120,0.25)`;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();
    }
    for (let i = 0; i < 6; i++) {
        ctx.save();
        ctx.rotate((Math.PI / 3) * i + 0.26);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(0, -s * 0.65);
        ctx.strokeStyle = '#c8a000';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, -s * 0.65, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = '#ff9900';
        ctx.fill();
        ctx.restore();
    }
}

function drawRealisticLotus(ctx, size, bloom) {
    const s = size * bloom;
    const layers = [
        { n: 10, off: s * 0.80, ew: s * 0.28, eh: s * 0.92, c1: '#ff6090', c2: '#ffc0d0' },
        { n:  8, off: s * 0.55, ew: s * 0.22, eh: s * 0.72, c1: '#e03070', c2: '#ffaac0' },
        { n:  6, off: s * 0.32, ew: s * 0.18, eh: s * 0.52, c1: '#c02060', c2: '#ff88a8' },
        { n:  5, off: s * 0.15, ew: s * 0.12, eh: s * 0.32, c1: '#ff8099', c2: '#ffe0ea' },
    ];
    layers.forEach((l) => {
        for (let i = 0; i < l.n; i++) {
            ctx.save();
            ctx.rotate((Math.PI * 2 / l.n) * i);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(l.ew, -l.off * 0.4, l.ew * 0.8, -l.off, 0, -l.off - l.eh * 0.3);
            ctx.bezierCurveTo(-l.ew * 0.8, -l.off, -l.ew, -l.off * 0.4, 0, 0);
            const g = linearGrad(0, 0, 0, -l.off - l.eh * 0.3, [
                [0, l.c1], [0.6, l.c1], [1, l.c2]
            ]);
            ctx.fillStyle = g;
            ctx.fill();
            ctx.restore();
        }
    });
    const cg = radialGrad(0, 0, 0, s * 0.2, [
        [0, '#fff0a0'], [0.6, '#ffc000'], [1, '#e08000']
    ]);
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.2, 0, Math.PI * 2);
    ctx.fillStyle = cg;
    ctx.fill();
}

function drawRealisticLavender(ctx, size, bloom) {
    const s = size * bloom;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -s * 1.6);
    ctx.strokeStyle = '#8a7aaa';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    const steps = 10;
    for (let i = 0; i < steps; i++) {
        const t = i / steps;
        const fy = -s * 0.25 - t * s * 1.2;
        const fade = 0.5 + t * 0.5;
        const bSize = (3 + (1 - t) * 4) * bloom;
        const sides = [-1, 1];
        sides.forEach(side => {
            ctx.save();
            ctx.translate(side * bSize * 1.1, fy);
            ctx.rotate(side * 0.4);
            ctx.beginPath();
            ctx.ellipse(0, 0, bSize * 0.55, bSize, 0, 0, Math.PI * 2);
            const g = radialGrad(0, -bSize * 0.3, 0, bSize, [
                [0, `rgba(220,200,255,${fade})`],
                [0.5, `rgba(160,100,230,${fade})`],
                [1,   `rgba(90,30,160,${fade})`],
            ]);
            ctx.fillStyle = g;
            ctx.fill();
            ctx.restore();
        });
        ctx.save();
        ctx.translate(0, fy - bSize * 0.6);
        ctx.beginPath();
        ctx.ellipse(0, 0, bSize * 0.4, bSize * 0.7, 0, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180,120,240,${0.4 + t * 0.4})`;
        ctx.fill();
        ctx.restore();
    }
}

function drawRealisticPeony(ctx, size, bloom) {
    const s = size * bloom;
    const layerDefs = [
        { n: 12, rMin: s * 0.68, rMax: s * 0.98, ew: s * 0.32, eh: s * 0.52, h1: 340, h2: 350 },
        { n: 10, rMin: s * 0.50, rMax: s * 0.75, ew: s * 0.28, eh: s * 0.48, h1: 340, h2: 355 },
        { n:  8, rMin: s * 0.32, rMax: s * 0.55, ew: s * 0.22, eh: s * 0.40, h1: 345, h2:   5 },
        { n:  6, rMin: s * 0.18, rMax: s * 0.36, ew: s * 0.16, eh: s * 0.30, h1: 350, h2:  10 },
        { n:  5, rMin: s * 0.06, rMax: s * 0.20, ew: s * 0.10, eh: s * 0.20, h1:   0, h2:  20 },
    ];
    layerDefs.forEach((l, li) => {
        for (let i = 0; i < l.n; i++) {
            const off = rnd(l.rMin, l.rMax);
            ctx.save();
            ctx.rotate((Math.PI * 2 / l.n) * i + li * 0.28 + rnd(-0.1, 0.1));
            ctx.beginPath();
            ctx.ellipse(0, -off, l.ew + rnd(-2, 2), l.eh + rnd(-2, 2), rnd(-0.15, 0.15), 0, Math.PI * 2);
            const hue = rnd(l.h1, l.h2);
            const g = radialGrad(0, -off * 0.6, 0, l.eh, [
                [0, `hsl(${hue},100%,92%)`],
                [0.5, `hsl(${hue},90%,72%)`],
                [1, `hsl(${hue},85%,45%)`],
            ]);
            ctx.fillStyle = g;
            ctx.fill();
            ctx.restore();
        }
    });
    const cg = radialGrad(0, 0, 0, s * 0.1, [
        [0, '#fff8b0'], [1, '#e0c000']
    ]);
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.1, 0, Math.PI * 2);
    ctx.fillStyle = cg;
    ctx.fill();
}

function drawStem(startX, startY, cpX, cpY, targetX, targetY, t, color) {
    const steps = 60;
    const tEnd = Math.min(t, 1);
    ctx.beginPath();
    for (let i = 0; i <= steps * tEnd; i++) {
        const s = i / steps;
        const x = (1-s)*(1-s)*startX + 2*(1-s)*s*cpX + s*s*targetX;
        const y = (1-s)*(1-s)*startY + 2*(1-s)*s*cpY + s*s*targetY;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    const stemGrad = ctx.createLinearGradient(startX, startY, targetX, targetY);
    stemGrad.addColorStop(0, '#1a3d10');
    stemGrad.addColorStop(0.4, color);
    stemGrad.addColorStop(1, '#2d6018');
    ctx.strokeStyle = stemGrad;
    ctx.lineWidth = 4.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
    ctx.beginPath();
    for (let i = 0; i <= steps * tEnd; i++) {
        const s = i / steps;
        const x = (1-s)*(1-s)*startX + 2*(1-s)*s*cpX + s*s*targetX;
        const y = (1-s)*(1-s)*startY + 2*(1-s)*s*cpY + s*s*targetY;
        if (i === 0) ctx.moveTo(x + 1, y);
        else ctx.lineTo(x + 1, y);
    }
    ctx.strokeStyle = 'rgba(120,200,80,0.18)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
}

function drawLeaf(x, y, angle, size) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(size * 0.7, -size * 0.3, size * 0.9, -size * 0.8, 0, -size * 1.1);
    ctx.bezierCurveTo(-size * 0.9, -size * 0.8, -size * 0.7, -size * 0.3, 0, 0);
    const g = linearGrad(0, 0, 0, -size * 1.1, [
        [0, '#1a4d08'], [0.4, '#2e7d12'], [1, '#4caf28']
    ]);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(0, -size * 0.55, 0, -size * 1.05);
    ctx.strokeStyle = 'rgba(30,80,10,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
}

class FlowerStem {
    constructor(tx, ty, type) {
        this.sx = W() / 2 + rnd(-15, 15);
        this.sy = H() + 10;
        this.tx = tx;
        this.ty = ty;
        this.cpX = (this.sx + tx) / 2 + rnd(-60, 60);
        this.cpY = (this.sy + ty) / 2 + rnd(-40, 40);
        this.type = type;
        this.size = rnd(28, 40);
        this.stemColor = `hsl(${rnd(118, 142)}, ${rnd(45,65)}%, ${rnd(24,36)}%)`;
        this.progress = 0;
        this.speed = rnd(0.012, 0.018);
        this.bloomProgress = 0;
        this.done = false;
        this.leafT1 = rnd(0.35, 0.55);
        this.leafT2 = rnd(0.6, 0.8);
        this.leafAngle1 = rnd(0.4, 1.0) * (Math.random() < 0.5 ? 1 : -1);
        this.leafAngle2 = rnd(0.4, 1.0) * (Math.random() < 0.5 ? -1 : 1);
        this.leafSize = rnd(14, 20);
        this.flowerRot = rnd(-0.15, 0.15);
    }

    bezier(t) {
        return {
            x: (1-t)*(1-t)*this.sx + 2*(1-t)*t*this.cpX + t*t*this.tx,
            y: (1-t)*(1-t)*this.sy + 2*(1-t)*t*this.cpY + t*t*this.ty
        };
    }

    update() {
        ctx.save();
        ctx.shadowColor = 'transparent';
        if (this.progress < 1) {
            drawStem(this.sx, this.sy, this.cpX, this.cpY, this.tx, this.ty, this.progress, this.stemColor);
            this.progress += this.speed;
        } else {
            drawStem(this.sx, this.sy, this.cpX, this.cpY, this.tx, this.ty, 1, this.stemColor);
            if (this.bloomProgress > 0.1) {
                const l1 = this.bezier(this.leafT1);
                const l2 = this.bezier(this.leafT2);
                drawLeaf(l1.x, l1.y, this.leafAngle1, this.leafSize * Math.min(this.bloomProgress * 2, 1));
                drawLeaf(l2.x, l2.y, this.leafAngle2, this.leafSize * Math.min(this.bloomProgress * 2, 1));
            }
            ctx.translate(this.tx, this.ty);
            ctx.rotate(this.flowerRot);
            ctx.shadowColor = 'rgba(255,180,200,0.22)';
            ctx.shadowBlur = 22;
            switch (this.type) {
                case 'rose':       drawRealisticRose(ctx, this.size, this.bloomProgress); break;
                case 'sunflower': drawRealisticSunflower(ctx, this.size, this.bloomProgress); break;
                case 'lily':      drawRealisticLily(ctx, this.size, this.bloomProgress); break;
                case 'lotus':     drawRealisticLotus(ctx, this.size, this.bloomProgress); break;
                case 'lavender':  drawRealisticLavender(ctx, this.size, this.bloomProgress); break;
                case 'peony':     drawRealisticPeony(ctx, this.size, this.bloomProgress); break;
            }
            if (this.bloomProgress < 1) this.bloomProgress += 0.022;
            else this.done = true;
        }
        ctx.restore();
    }
}

function animate() {
    ctx.clearRect(0, 0, W(), H());
    particles.forEach(p => { p.update(); p.draw(); });
    flowers.forEach(f => f.update());
    requestAnimationFrame(animate);
}
animate();

const customSequence = [
    { type: 'rose',      position: 'left' },
    { type: 'sunflower', position: 'right' },
    { type: 'lotus',     position: 'center' },
    { type: 'lily',      position: 'left' },
    { type: 'lotus',     position: 'right' },
    { type: 'rose',      position: 'center' },
    { type: 'lotus',     position: 'left' },
    { type: 'lily',      position: 'right' },
    { type: 'sunflower', position: 'center' },
    { type: 'sunflower', position: 'left' },
    { type: 'lotus',     position: 'right' },
    { type: 'lily',      position: 'center' }
];

let sequenceIndex = 0; 

function spawnFlowerSequence() {
    if (sequenceIndex >= customSequence.length) {
        clearInterval(spawnInterval); 
        return;
    }

    const currentStep = customSequence[sequenceIndex];
    const currentType = currentStep.type;
    let angle, radius;

    if (currentStep.position === 'left') {
        angle = rnd(-Math.PI * 0.76, -Math.PI * 0.58);
        radius = rnd(H() * 0.45, H() * 0.68);
    } else if (currentStep.position === 'right') {
        angle = rnd(-Math.PI * 0.42, -Math.PI * 0.24);
        radius = rnd(H() * 0.45, H() * 0.68);
    } else { 
        angle = rnd(-Math.PI * 0.54, -Math.PI * 0.46);
        radius = rnd(H() * 0.38, H() * 0.58);
    }

    const tx = W() / 2 + Math.cos(angle) * radius;
    const ty = H() + Math.sin(angle) * radius;

    if (tx > 40 && tx < W() - 40 && ty > 60 && ty < H() - 120) {
        flowers.push(new FlowerStem(tx, ty, currentType));
        sequenceIndex++; 
    }
}

const spawnInterval = setInterval(spawnFlowerSequence, 1200);
spawnFlowerSequence(); 
</script>
